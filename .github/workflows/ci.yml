name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_API: hrishikeshchandi/devops-project-api
  IMAGE_NAME_WORKER: hrishikeshchandi/devops-project-worker
  IMAGE_NAME_RECOVERY: hrishikeshchandi/devops-project-recovery
  IMAGE_NAME_HEARTBEAT: hrishikeshchandi/devops-project-heartbeat
  IMAGE_NAME_FRONTEND: hrishikeshchandi/devops-project-frontend

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install linting tools
        run: pip install flake8 black
      - name: Run flake8
        run: flake8 . --max-line-length=127 --statistics
      - name: Check black formatting
        run: black --check --diff .

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt
      - name: Wait for MongoDB
        run: sleep 10
      - name: Run pytest with coverage
        env:
          MONGO_URI: mongodb://localhost:27017/
        run: |
          pytest tests/ -v --cov=. --cov-report=term --cov-report=html --cov-fail-under=35
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 7

  postman:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Start Docker Compose
        run: |
          docker compose up -d
          sleep 10
      - name: Install Newman
        run: npm install -g newman
      - name: Run Postman collection
        run: newman run tests/postman-collection.json
      - name: Stop Docker Compose
        run: docker compose down

  build-and-push:
    runs-on: ubuntu-latest
    needs: [test, postman]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build API image
        run: docker build -t ${{ env.IMAGE_NAME_API }}:${{ github.sha }} -f Dockerfile.api .
      - name: Build Worker image
        run: docker build -t ${{ env.IMAGE_NAME_WORKER }}:${{ github.sha }} -f Dockerfile.worker .
      - name: Build Recovery image
        run: docker build -t ${{ env.IMAGE_NAME_RECOVERY }}:${{ github.sha }} -f Dockerfile.recovery .
      - name: Build Heartbeat image
        run: docker build -t ${{ env.IMAGE_NAME_HEARTBEAT }}:${{ github.sha }} -f Dockerfile.heartbeat .
      - name: Build Frontend image
        run: docker build -t ${{ env.IMAGE_NAME_FRONTEND }}:${{ github.sha }} -f Dockerfile.frontend .
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Tag and push to both registries
        run: |
          for img in API WORKER RECOVERY HEARTBEAT FRONTEND; do
            NAME_VAR="IMAGE_NAME_$img"
            NAME="${!NAME_VAR}"
            
            # Tag for ghcr.io
            docker tag $NAME:${{ github.sha }} ${{ env.REGISTRY }}/$NAME:${{ github.sha }}
            docker tag $NAME:${{ github.sha }} ${{ env.REGISTRY }}/$NAME:latest
            docker push ${{ env.REGISTRY }}/$NAME:${{ github.sha }}
            docker push ${{ env.REGISTRY }}/$NAME:latest
            
            # Tag for Docker Hub
            DOCKER_HUB_NAME="hrishikeshchandi/${NAME#*/}"
            docker tag $NAME:${{ github.sha }} $DOCKER_HUB_NAME:${{ github.sha }}
            docker tag $NAME:${{ github.sha }} $DOCKER_HUB_NAME:latest
            docker push $DOCKER_HUB_NAME:${{ github.sha }}
            docker push $DOCKER_HUB_NAME:latest
          done
          
