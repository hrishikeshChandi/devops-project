apiVersion: v1
kind: Service
metadata:
  name: api-service
spec:
  selector:
    app: orchestrator-api
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: mongodb-service
spec:
  ports:
    - protocol: TCP
      port: 27017
      targetPort: 27017
  clusterIP: None

---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  selector:
    app: orchestrator-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: NodePort