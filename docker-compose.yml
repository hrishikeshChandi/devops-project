version: "3.8"

services:
  mongodb:
    image: mongo:7
    container_name: orchestrator-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - orchestrator-net

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: orchestrator-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/
      - HOST=0.0.0.0
      - PORT=8000
      - RL_ENABLED=true
      - DISABLE_WORKER_SPAWN=true
    depends_on:
      - mongodb
    networks:
      - orchestrator-net

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    environment:
      - MONGO_URI=mongodb://mongodb:27017/
      - HOST=api
      - PORT=8000
    depends_on:
      - api
      - mongodb
    networks:
      - orchestrator-net

  recovery:
    build:
      context: .
      dockerfile: Dockerfile.recovery
    restart: unless-stopped
    environment:
      - MONGO_URI=mongodb://mongodb:27017/
      - HOST=api
      - PORT=8000
    depends_on:
      - api
      - mongodb
    networks:
      - orchestrator-net

  heartbeat:
    build:
      context: .
      dockerfile: Dockerfile.heartbeat
    restart: unless-stopped
    environment:
      - MONGO_URI=mongodb://mongodb:27017/
      - HOST=api
      - PORT=8000
    depends_on:
      - api
      - mongodb
    networks:
      - orchestrator-net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: orchestrator-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - orchestrator-net
  prometheus:
    image: prom/prometheus:latest
    container_name: orchestrator-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - orchestrator-net
    depends_on:
      - api

  grafana:
    image: grafana/grafana:latest
    container_name: orchestrator-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
    networks:
      - orchestrator-net
    depends_on:
      - prometheus

networks:
  orchestrator-net:
    driver: bridge

volumes:
  mongodb_data:
  prometheus_data:
  grafana_data:
